<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dutch House Price Index</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --navy: #0a1628;
    --blue: #1a3a6b;
    --accent: #c8392b;
    --gold: #d4a843;
    --light: #f5f2ec;
    --mid: #e8e3d8;
    --text: #1c1c1c;
    --muted: #6b6457;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--light);
    color: var(--text);
    padding: 48px 40px;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--mid);
    position: relative;
  }

  .section-title::after {
    content: '';
    position: absolute;
    bottom: -2px; left: 0;
    width: 60px; height: 2px;
    background: var(--accent);
  }

  .chart-container {
    background: var(--white);
    border: 1px solid var(--mid);
    padding: 32px;
  }

  .chart-header {
    margin-bottom: 28px;
  }

  .chart-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }

  .chart-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  /* legend */
  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  .legend-line {
    width: 28px;
    height: 3px;
    border-radius: 2px;
  }

  .legend-line.dashed {
    background: repeating-linear-gradient(
      to right,
      var(--blue) 0, var(--blue) 6px,
      transparent 6px, transparent 10px
    );
    height: 2px;
  }

  /* canvas wrapper */
  .canvas-wrap {
    position: relative;
    width: 100%;
  }

  canvas {
    display: block;
    width: 100%;
  }

  /* tooltip */
  .tooltip {
    position: absolute;
    background: var(--navy);
    color: var(--white);
    padding: 10px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
    border-top: 2px solid var(--gold);
    z-index: 10;
  }

  .tooltip.visible { opacity: 1; }

  .footer-note {
    margin-top: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    display: flex;
    justify-content: space-between;
  }

  /* error */
  .error-msg {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    padding: 40px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="section-label">Market Data</div>
<div class="section-title">House Price Index</div>

<div class="chart-container">
  <div class="chart-header">
    <div class="chart-title">Average Purchase Price (euros)</div>
    <div class="chart-meta" id="chart-meta">Loading…</div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-line" style="background:var(--accent);"></div>
      House Price Index
    </div>
 <!--   <div class="legend-item">
      <div class="legend-line dashed"></div>
      Construction Cost Index
    </div>
  </div>  -->

  <div class="canvas-wrap">
    <canvas id="chart" height="320"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <div class="footer-note">
    <span id="row-count"></span>
    <span id="last-updated"></span>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  PASTE YOUR RAW GITHUB CSV URL HERE
// ─────────────────────────────────────────────
const CSV_URL = "https://raw.githubusercontent.com/Flaviapaoloni/housing/refs/heads/main/house_price_cbs.csv";
// Example:
// const CSV_URL = "https://raw.githubusercontent.com/username/repo/main/hpi.csv";
//
// Expected CSV columns: year, house_price_index
// ─────────────────────────────────────────────

Papa.parse(CSV_URL, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: ({ data }) => {
    if (!data || data.length === 0) {
      showError("No data found in the CSV file.");
      return;
    }
    drawChart(data);
  },
  error: () => showError("Could not load CSV. Check the URL in the source code.")
});

function showError(msg) {
  document.querySelector('.canvas-wrap').innerHTML = `<div class="error-msg">${msg}</div>`;
  document.getElementById('chart-meta').textContent = 'Error loading data';
}

function drawChart(data) {
  const years = data.map(r => r.year ?? '');
  const hpi   = data.map(r => parseFloat(r.house_price_index));
  const cci   = data.map(r => parseFloat(r.construction_cost_index));

  const allVals = [...hpi, ...cci].filter(v => !isNaN(v));
  const minVal  = Math.min(...allVals);
  const maxVal  = Math.max(...allVals);

  // Update meta
  document.getElementById('chart-meta').textContent =
    `Index Jan 2000 = 100 · ${years[0]} – ${years[years.length - 1]} · Source: CBS, CPB`;
  document.getElementById('row-count').textContent   = `${data.length} observations`;
  document.getElementById('last-updated').textContent = 'Loaded ' + new Date().toLocaleTimeString();

  const canvas  = document.getElementById('chart');
  const dpr     = window.devicePixelRatio || 1;
  const W       = canvas.offsetWidth;
  const H       = 320;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx     = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Padding
  const pad = { top: 20, right: 24, bottom: 40, left: 52 };
  const chartW = W - pad.left - pad.right;
  const chartH = H - pad.top - pad.bottom;

  // Scale helpers
  const yPad   = (maxVal - minVal) * 0.08;
  const yMin   = minVal - yPad;
  const yMax   = maxVal + yPad;
  const xScale = i  => pad.left + (i / (years.length - 1)) * chartW;
  const yScale = v  => pad.top  + chartH - ((v - yMin) / (yMax - yMin)) * chartH;

  // ── Grid lines & y-axis labels ──
  const ticks = 5;
  ctx.strokeStyle = '#e8e3d8';
  ctx.lineWidth   = 1;
  ctx.font        = `${10 * dpr / dpr}px DM Mono, monospace`;
  ctx.fillStyle   = '#9a9080';
  ctx.textAlign   = 'right';

  for (let t = 0; t <= ticks; t++) {
    const v = yMin + (t / ticks) * (yMax - yMin);
    const y = yScale(v);
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(pad.left + chartW, y);
    ctx.stroke();
    ctx.fillText(Math.round(v), pad.left - 8, y + 4);
  }

  // ── x-axis labels (show ~8 evenly spaced) ──
  ctx.textAlign  = 'center';
  ctx.fillStyle  = '#9a9080';
  const step     = Math.max(1, Math.floor(years.length / 8));
  years.forEach((yr, i) => {
    if (i % step === 0 || i === years.length - 1) {
      ctx.fillText(yr, xScale(i), H - pad.bottom + 16);
    }
  });

  // ── Fill under HPI ──
  const gradient = ctx.createLinearGradient(0, pad.top, 0, pad.top + chartH);
  gradient.addColorStop(0, 'rgba(200,57,43,0.12)');
  gradient.addColorStop(1, 'rgba(200,57,43,0)');

  ctx.beginPath();
  hpi.forEach((v, i) => {
    if (isNaN(v)) return;
    i === 0 ? ctx.moveTo(xScale(i), yScale(v)) : ctx.lineTo(xScale(i), yScale(v));
  });
  ctx.lineTo(xScale(hpi.length - 1), pad.top + chartH);
  ctx.lineTo(xScale(0), pad.top + chartH);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();

  // ── Draw CCI (dashed blue) ──
  ctx.beginPath();
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#1a3a6b';
  ctx.lineWidth   = 2;
  cci.forEach((v, i) => {
    if (isNaN(v)) return;
    i === 0 ? ctx.moveTo(xScale(i), yScale(v)) : ctx.lineTo(xScale(i), yScale(v));
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // ── Draw HPI (solid red) ──
  ctx.beginPath();
  ctx.strokeStyle = '#c8392b';
  ctx.lineWidth   = 2.5;
  hpi.forEach((v, i) => {
    if (isNaN(v)) return;
    i === 0 ? ctx.moveTo(xScale(i), yScale(v)) : ctx.lineTo(xScale(i), yScale(v));
  });
  ctx.stroke();

  // ── Tooltip on hover ──
  const tooltip  = document.getElementById('tooltip');
  const canvasEl = canvas;

  canvasEl.addEventListener('mousemove', e => {
    const rect  = canvasEl.getBoundingClientRect();
    const mx    = (e.clientX - rect.left);
    const inner = mx - pad.left;

    if (inner < 0 || inner > chartW) {
      tooltip.classList.remove('visible');
      return;
    }

    const idx    = Math.round((inner / chartW) * (years.length - 1));
    const clamped = Math.max(0, Math.min(idx, years.length - 1));
    const hv     = hpi[clamped];
    const cv     = cci[clamped];

    tooltip.innerHTML =
      `<strong>${years[clamped]}</strong><br>` +
      `HPI: ${isNaN(hv) ? '—' : hv.toFixed(1)}<br>` +
      `CCI: ${isNaN(cv) ? '—' : cv.toFixed(1)}<br>` +
      `Gap: ${(!isNaN(hv) && !isNaN(cv)) ? (hv - cv).toFixed(1) : '—'}`;

    const tx = xScale(clamped) * (rect.width / W);
    const ty = 0;
    tooltip.style.left = (tx + 12) + 'px';
    tooltip.style.top  = ty + 'px';
    tooltip.classList.add('visible');
  });

  canvasEl.addEventListener('mouseleave', () => {
    tooltip.classList.remove('visible');
  });

  // Redraw on resize
  window.addEventListener('resize', () => drawChart(data));
}
</script>
</body>
</html>
